<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Expense Tracker - Dashboard</title>
    <link rel="stylesheet" href="/style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <nav class="nav">
      <div class="container nav-inner">
        <h1 class="logo">ExpenseTracker</h1>
        <button id="logout-btn" class="btn btn-ghost">Logout</button>
      </div>
    </nav>

    <main class="container dashboard">
      <section class="row cards">
        <div class="card stat-card">
          <h3>Monthly Budget</h3>
          <p id="budget-amount">$0</p>
        </div>
        <div class="card stat-card">
          <h3>Total Expenses</h3>
          <p id="total-expenses">$0</p>
        </div>
        <div class="card stat-card">
          <h3>Remaining</h3>
          <p id="remaining" class="green">$0</p>
        </div>
      </section>

      <section class="row">
        <div class="card form-card">
          <h3>Set Monthly Budget</h3>
          <form id="budget-form">
            <input type="number" id="budget-input" min="0" placeholder="Enter budget" />
            <button class="btn" id="save-budget">Save</button>
          </form>
        </div>

        <div class="card form-card">
          <h3>Add Expense</h3>
          <form id="expense-form">
            <input type="text" id="title" placeholder="Title" required />
            <input type="number" id="amount" placeholder="Amount" min="0" required />
            <select id="category" required>
              <option value="Food">Food</option>
              <option value="Travel">Travel</option>
              <option value="Shopping">Shopping</option>
              <option value="Bills">Bills</option>
              <option value="Entertainment">Entertainment</option>
              <option value="Other">Other</option>
            </select>
            <input type="date" id="date" />
            <button class="btn">Add</button>
          </form>
        </div>
      </section>

      <section class="row">
        <div class="card expenses-card">
          <h3>Expenses</h3>
          <div id="expenses-list"></div>
        </div>

        <div class="card chart-card">
          <h3>Category Distribution</h3>
          <canvas id="categoryChart" width="400" height="400"></canvas>
        </div>
      </section>
    </main>

    <script src="/script.js"></script>
  </body>
</html>
